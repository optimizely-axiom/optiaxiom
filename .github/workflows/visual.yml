name: Visual

on:
  pull_request:
    branches: [v1]
    types: [labeled]
  push:
    branches: [v1]

jobs:
  chromatic:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.repository_owner == 'optimizely-axiom') || (github.event_name == 'push' && github.repository_owner == 'optimizely-axiom') || github.event.label.name == 'visual' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - run: |
          pnpm install
          pnpm exec playwright install
          pnpm build

      - uses: chromaui/action@latest
        with:
          buildScriptName: build
          exitZeroOnChanges: true
          projectToken: chpt_1768d7812fc589a
          workingDir: apps/storybook
