name: CI

on:
  pull_request:
    branches: [main, next]
  push:
    branches: [main, next]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'pull_request' && github.repository_owner == 'optimizely-axiom' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - run: pnpm install

      - run: pnpm exec playwright install chromium

      - run: |
          pnpm build
          pnpm --silent bundle-size > bundle-size-main.json

      - uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          path: bundle-size-main.json

      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - run: pnpm install

      - run: pnpm exec playwright install chromium

      - uses: actions/download-artifact@v8

      - run: |
          mkdir ./pr
          echo ${{ github.event.number }} > ./pr/ID
          pnpm build
          pnpm --silent bundle-size compare bundle-size-main.json > ./pr/bundle-size.md

      - uses: actions/upload-artifact@v7
        with:
          name: pr-build
          path: pr/

  docs:
    if: ${{ github.event_name == 'pull_request' && github.repository_owner == 'optimizely-axiom' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - run: pnpm install

      - uses: actions/cache@v5
        with:
          path: apps/docs/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/docs/**/*.mjs', 'apps/docs/**/*.mdx', 'apps/docs/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm -F docs... build

  lint:
    if: ${{ github.event_name == 'pull_request' || github.repository_owner == 'optimizely-axiom' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - run: pnpm install

      - run: pnpm lint --no-fix

  test:
    env:
      LC_ALL: en_US.UTF-8
    if: ${{ github.event_name == 'pull_request' || github.repository_owner == 'optimizely-axiom' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - run: pnpm install

      - run: pnpm exec playwright install chromium

      - run: pnpm -F icons... -F proteus... -F web-components... build

      - name: Check schema files are up-to-date
        run: |
          git diff --exit-code packages/proteus/src/schema/public-schema.json packages/proteus/src/schema/runtime-schema.json || {
            echo "Error: Schema files are out of date. Please run 'pnpm -F proteus build' and commit the changes."
            exit 1
          }

      - if: ${{ github.event_name == 'push' }}
        run: pnpm exec vitest run '--project=!storybook'

      - if: ${{ github.event_name != 'push' }}
        run: pnpm exec vitest run
        timeout-minutes: 3
