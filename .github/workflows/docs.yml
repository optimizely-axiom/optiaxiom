name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.repository_owner == 'optimizely-axiom' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - uses: actions/configure-pages@v5

      - run: pnpm install

      - uses: actions/cache@v5
        with:
          path: apps/docs/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/docs/**/*.mjs', 'apps/docs/**/*.mdx', 'apps/docs/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm -F docs... build && echo '' > ./apps/docs/out/.nojekyll

      - uses: actions/upload-artifact@v4
        with:
          name: docs-${{ github.ref_name }}
          path: ./apps/docs/out

  deploy:
    if: ${{ github.repository_owner == 'optimizely-axiom' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download current branch artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-${{ github.ref_name }}
          path: combined

      - name: Determine other branch
        id: other
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "branch=next" >> "$GITHUB_OUTPUT"
            echo "subpath=v3" >> "$GITHUB_OUTPUT"
          else
            echo "branch=main" >> "$GITHUB_OUTPUT"
            echo "subpath=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download other branch artifact
        uses: actions/github-script@v7
        id: download-other
        continue-on-error: true
        with:
          script: |
            const branch = '${{ steps.other.outputs.branch }}';
            const artifactName = `docs-${branch}`;

            // Find the latest successful workflow run on the other branch
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docs.yml',
              branch: branch,
              status: 'success',
              per_page: 1,
            });

            if (runs.data.workflow_runs.length === 0) {
              core.warning(`No successful runs found for branch ${branch}`);
              return;
            }

            const runId = runs.data.workflow_runs[0].id;

            // List artifacts for that run
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const artifact = artifacts.data.artifacts.find(a => a.name === artifactName);
            if (!artifact) {
              core.warning(`Artifact ${artifactName} not found in run ${runId}`);
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });

            const fs = require('fs');
            fs.writeFileSync('other-docs.zip', Buffer.from(download.data));
            core.setOutput('found', 'true');

      - name: Merge other branch docs
        if: ${{ steps.download-other.outputs.found == 'true' }}
        run: |
          if [ "${{ steps.other.outputs.branch }}" = "next" ]; then
            # We're on main, merge next into combined/v3/
            mkdir -p combined/v3
            unzip -o other-docs.zip -d combined/v3
          else
            # We're on next, merge main as the root and move our build into v3/
            mkdir -p other-root
            unzip -o other-docs.zip -d other-root
            # Move current build (next) into v3 subfolder of main's output
            mv combined other-build
            cp -r other-root/* combined/ 2>/dev/null || mv other-root combined
            mkdir -p combined/v3
            cp -r other-build/* combined/v3/
          fi

      - name: Upload combined pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./combined

      - id: deployment
        uses: actions/deploy-pages@v5
